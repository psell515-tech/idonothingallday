
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — IDNAD CLASSICS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #000;
      --white: #fff;
      --dim: rgba(255,255,255,0.5);
      --border: rgba(255,255,255,0.1);
      --border-focus: rgba(255,255,255,0.35);
      --accent: #e8ff00;
      --header-h: 56px;
    }

    html, body {
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    #header-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      z-index: 100;
    }

    #header {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #site-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.12em;
      color: var(--white);
      text-decoration: none;
      opacity: 0.95;
    }

    #site-title span { color: var(--accent); }

    #nav-left {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.2s ease;
      position: relative;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .nav-link:hover { color: var(--white); }
    .nav-link:hover::after { width: 100%; }

    /* ── PAGE LAYOUT ── */
    #page {
      padding-top: calc(var(--header-h) + 80px);
      padding-bottom: 80px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADING ── */
    .page-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      animation: fadeUp 0.6s ease both;
    }

    h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 8vw, 80px);
      letter-spacing: 0.06em;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 48px;
      animation: fadeUp 0.6s 0.08s ease both;
    }

    /* ── FORM ── */
    #form-wrapper {
      width: 90%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 0;
      animation: fadeUp 0.6s 0.16s ease both;
      border: 1px solid var(--border);
    }

    .field {
      position: relative;
      border-bottom: 1px solid var(--border);
    }

    .field:last-of-type {
      border-bottom: none;
    }

    .field label {
      position: absolute;
      top: 14px;
      left: 18px;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      pointer-events: none;
    }

    .field input,
    .field textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--white);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 36px 18px 14px;
      transition: background 0.2s ease;
      resize: none;
    }

    .field textarea {
      min-height: 140px;
    }

    .field input:focus,
    .field textarea:focus {
      background: rgba(255,255,255,0.03);
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: rgba(255,255,255,0.2);
    }

    /* ── SUBMIT ── */
    #submit-row {
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
    }

    button[type="submit"] {
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 18px 32px;
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease;
    }

    button[type="submit"]:hover {
      color: var(--accent);
      background: rgba(232,255,0,0.04);
    }

    /* ── SUCCESS ── */
    #success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeUp 0.5s ease both;
    }

    #success .check {
      font-size: 32px;
      color: var(--accent);
    }

    #success p {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      #header { padding: 0 16px; }
      #nav-left { gap: 18px; }
      .nav-link { font-size: 10px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="header-container"></div>
  <script>
    fetch("/header.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("header-container").innerHTML = html;
      });
  </script>

  <!-- PAGE -->
  <div id="page">
    <p class="page-label">Get in touch</p>
    <h2>Contact</h2>

    <div id="form-wrapper">
      <form id="contactForm">
        <div class="field">
          <label>Name</label>
          <input type="text" name="name" placeholder="Your name" required>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="field">
          <label>Message</label>
          <textarea name="message" placeholder="Talk to me." required></textarea>
        </div>
        <div id="submit-row">
          <button type="submit">Send →</button>
        </div>
      </form>
    </div>

    <div id="success">
      <div class="check">✦</div>
      <p>Message sent. Thank you.</p>
    </div>
  </div>

  <script>
    document.getElementById("contactForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = {
        name: form.name.value,
        email: form.email.value,
        message: form.message.value,
      };
      try {
        const res = await fetch("/contact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const json = await res.json();
        if (json.ok) {
          document.getElementById("form-wrapper").style.display = "none";
          const success = document.getElementById("success");
          success.style.display = "flex";
        } else {
          alert("There was an error submitting your message.");
        }
      } catch (err) {
        console.error(err);
        alert("Unable to submit. Please try again.");
      }
    });
  </script>

</body>
</html>
