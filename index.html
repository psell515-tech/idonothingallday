
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IDNAD CLASSICS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black: #000;
      --white: #fff;
      --dim: rgba(255,255,255,0.5);
      --border: rgba(255,255,255,0.1);
      --accent: #e8ff00;
      --header-h: 56px;
    }

    html, body {
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    #header-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      z-index: 100;
    }

    /* These styles apply once header.html is injected */
    #header {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #site-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.12em;
      color: var(--white);
      text-decoration: none;
      opacity: 0.95;
    }

    #site-title span {
      color: var(--accent);
    }

    #nav-left {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-link {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.2s ease;
      position: relative;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .nav-link:hover {
      color: var(--white);
    }

    .nav-link:hover::after {
      width: 100%;
    }

    /* ── MAIN CONTENT ── */
    #wrapper {
      padding-top: calc(var(--header-h) + 40px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #frame {
      position: relative;
      width: min(92vw, 860px);
      aspect-ratio: 16 / 9;
      background: #0a0a0a;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 40px 80px rgba(0,0,0,0.8),
        0 0 120px rgba(232,255,0,0.03);
      animation: fadeUp 0.8s ease both;
    }

    #frame::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.015) 2px,
        rgba(255,255,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    #media {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #more {
      margin-top: 24px;
      padding: 0 32px;
      height: 42px;
      background: transparent;
      color: var(--white);
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s ease, color 0.2s ease, background 0.2s ease;
      animation: fadeUp 0.8s 0.15s ease both;
    }

    #more:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(232,255,0,0.04);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      #header { padding: 0 16px; }
      #nav-left { gap: 18px; }
      .nav-link { font-size: 10px; }
    }
  </style>
</head>
<body>

  <!-- HEADER (fetched so changes propagate to all pages) -->
  <div id="header-container"></div>
  <script>
    fetch("/header.html")
      .then(r => r.text())
      .then(html => {
        document.getElementById("header-container").innerHTML = html;
      });
  </script>

  <!-- MAIN -->
  <div id="wrapper">
    <div id="frame">
      <div id="media"></div>
    </div>
    <button id="more">More</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
